server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    connection-timeout: 300000
    keep-alive-timeout: 300000

spring:
  application:
    name: quant-platform
  # MySQL datasource config
  datasource:
    url: jdbc:mysql://localhost:3306/stock?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&tinyInt1isBit=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
  # JPA removed, use MyBatis-Plus for all DB ops
  freemarker:
    charset: UTF-8
    content-type: text/html
    suffix: .ftl
    template-loader-path: classpath:/templates/
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.quant.platform.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ClickHouse 配置
clickhouse:
  host: 172.19.72.140
  port: 8123
  database: stock
  username: default
  password: 123456
  enabled: true  # 是否启用 ClickHouse 优先查询

logging:
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.quant.platform: INFO
    org.springframework.web: INFO

# DeepSeek LLM 统一配置（OpenAI 兼容接口，支持 DeepSeek / Ollama / Qwen 等）
llm:
  enabled: true                                    # 设为 true 启用 LLM
  base-url: https://api.deepseek.com/v1             # API 地址（Ollama: http://localhost:11434/v1）
  api-key: "sk-3bedb909271f49d59edbb2c1e5ab989d"                                       # API Key（Ollama 无需填写）
  model: deepseek-v4-flash                          # 模型名（deepseek-v4-flash / deepseek-v4-pro）
  max-tokens: 4096                                  # 最大输出 token 数（2048不够会导致JSON截断）
  temperature: 0.3                                  # 温度（低温更准确）
  timeout-seconds: 60                               # 请求超时（秒）

quant:
  monitor:
    poll-interval-seconds: 10   # 盘中行情轮询间隔（秒），默认10秒
    kline-thread-pool-size: 4  # K线并行拉取线程池大小
  clickhouse:
    enabled: true  # 分析模块 CH 查询开关
  backtest:
    thread-pool-size: 4
    max-concurrent-tasks: 10
  factor:
    script-timeout-seconds: 30
    cache-size: 1000
    ic:
      forward-return-days: 5   # IC 计算用的未来收益交易日数（默认5，改完需重启）
  aktools:
    enabled: true  # 设置为true启用AKTools数据获取
    domain: http://127.0.0.1:9090
    base-url: http://127.0.0.1:9090/api/public/
  data-update:
    python-path: python  # Python 可执行文件路径
    script-dir: C:/Users/warning5/WorkBuddy/quant-platform/scripts  # Python 脚本绝对路径
    default-start-days: 3       # 默认从几天前开始更新
  # 通知推送配置
  notification:
    channel: none  # none / serverchan / wecom / dingtalk
    serverchan:
      sendkey: ""   # Server酱 SendKey，https://sct.ftqq.com/ 获取
    wecom:
      webhook-url: ""  # 企业微信机器人 Webhook URL
    dingtalk:
      webhook-url: ""  # 钉钉机器人 Webhook URL
      secret: ""      # 钉钉加签密钥（可选）



