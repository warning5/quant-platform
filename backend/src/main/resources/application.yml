server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    connection-timeout: 300000
    keep-alive-timeout: 300000

spring:
  application:
    name: quant-platform
  # MySQL datasource config
  datasource:
    url: jdbc:mysql://localhost:3306/stock?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&tinyInt1isBit=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
  # JPA removed, use MyBatis-Plus for all DB ops
  freemarker:
    charset: UTF-8
    content-type: text/html
    suffix: .ftl
    template-loader-path: classpath:/templates/
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.quant.platform.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ClickHouse 配置
clickhouse:
  host: 172.19.72.140
  port: 8123
  database: stock
  username: default
  password: 123456
  enabled: true  # 是否启用 ClickHouse 优先查询

logging:
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.quant.platform: INFO
    org.springframework.web: INFO

quant:
  clickhouse:
    enabled: true  # 分析模块 CH 查询开关
  backtest:
    thread-pool-size: 4
    max-concurrent-tasks: 10
  factor:
    # LLM 配置（用于研报摘要生成 + 综合结论输出）
    llm:
      enabled: false                        # 设为 true 启用 LLM
      base-url: http://localhost:11434/v1   # Ollama / DeepSeek / Qwen 等
      api-key: ""                           # Ollama 无需 key；API key 留空
      model: qwen2.5:14b                    # 模型名（确保已启动）
      temperature: 0.3                       # 摘要用低温保持准确性
      max-tokens: 1024                       # 最大输出 token 数
      timeout: 30                            # 请求超时（秒）
    script-timeout-seconds: 30
    cache-size: 1000
  aktools:
    enabled: true  # 设置为true启用AKTools数据获取
    domain: http://127.0.0.1:9090
    base-url: http://127.0.0.1:9090/api/public/
  data-update:
    python-path: python  # Python 可执行文件路径
    script-dir: C:/Users/warning5/WorkBuddy/Claw/quant-platform/scripts  # Python 脚本绝对路径
    default-start-days: 3       # 默认从几天前开始更新



