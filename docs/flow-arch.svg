<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#78909C"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; fill: #263238; }
    .text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #37474F; }
    .text-small { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #546E7A; }
    .zone { fill: none; stroke: #B0BEC5; stroke-width: 0.5; stroke-dasharray: 4 2; rx: 8; }
    .box { stroke-width: 0.5; rx: 6; }
    .arr { fill: none; stroke: #78909C; stroke-width: 1; marker-end: url(#arrow); }
    .arr-down { fill: none; stroke: #78909C; stroke-width: 1.5; marker-end: url(#arrow); }
  </style>

  <!-- 区域1: 数据采集 -->
  <rect class="zone" x="40" y="20" width="600" height="85"/>
  <text class="title" x="50" y="16">1. 数据采集</text>

  <rect class="box" x="60" y="35" width="130" height="55" fill="#E3F2FD" stroke="#1565C0"/>
  <text class="text" x="125" y="50" text-anchor="middle">Baostock · 腾讯</text>
  <text class="text" x="125" y="64" text-anchor="middle">AKShare · 东财</text>
  <text class="text-small" x="125" y="78" text-anchor="middle">同花顺</text>

  <line class="arr" x1="195" y1="62" x2="205" y2="62"/>

  <rect class="box" x="210" y="42" width="110" height="42" fill="#E3F2FD" stroke="#1565C0"/>
  <text class="text" x="265" y="62" text-anchor="middle">Python 采集</text>
  <text class="text-small" x="265" y="76" text-anchor="middle">断点续传</text>

  <line class="arr" x1="325" y1="62" x2="335" y2="62"/>

  <rect class="box" x="345" y="35" width="130" height="56" fill="#FFF3E0" stroke="#E65100"/>
  <text class="text" x="410" y="50" text-anchor="middle">ClickHouse</text>
  <text class="text-small" x="410" y="63" text-anchor="middle">列存 / 日线</text>
  <text class="text" x="410" y="76" text-anchor="middle">MySQL</text>
  <text class="text-small" x="410" y="89" text-anchor="middle">元数据 / 配置</text>

  <line class="arr-down" x1="340" y1="105" x2="340" y2="115"/>

  <!-- 区域2: 因子计算 -->
  <rect class="zone" x="40" y="115" width="600" height="88"/>
  <text class="title" x="50" y="111">2. 因子计算</text>

  <rect class="box" x="60" y="130" width="110" height="32" fill="#E8F5E9" stroke="#2E7D32"/>
  <text class="text" x="115" y="148" text-anchor="middle">stock_daily</text>

  <line class="arr" x1="175" y1="146" x2="185" y2="146"/>

  <rect class="box" x="190" y="125" width="160" height="42" fill="#E8F5E9" stroke="#2E7D32"/>
  <text class="text" x="270" y="142" text-anchor="middle">FactorComputeEngine</text>
  <text class="text-small" x="270" y="156" text-anchor="middle">35+ 因子计算</text>

  <line class="arr" x1="355" y1="146" x2="365" y2="146"/>

  <rect class="box" x="370" y="130" width="110" height="32" fill="#E8F5E9" stroke="#2E7D32"/>
  <text class="text" x="425" y="148" text-anchor="middle">factor_value</text>

  <line class="arr" x1="425" y1="165" x2="425" y2="172"/>

  <rect class="box" x="370" y="174" width="110" height="28" fill="#E8F5E9" stroke="#2E7D32"/>
  <text class="text" x="425" y="191" text-anchor="middle">IC / 衰减 / 相关</text>

  <line class="arr-down" x1="340" y1="203" x2="340" y2="213"/>

  <!-- 区域3: 推荐管线 -->
  <rect class="zone" x="40" y="213" width="600" height="90"/>
  <text class="title" x="50" y="209">3. 推荐管线</text>

  <rect class="box" x="60" y="230" width="60" height="26" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text class="text" x="90" y="246" text-anchor="middle">P1</text>
  <line class="arr" x1="125" y1="243" x2="130" y2="243"/>

  <rect class="box" x="130" y="230" width="60" height="26" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text class="text" x="160" y="246" text-anchor="middle">P2</text>
  <line class="arr" x1="195" y1="243" x2="200" y2="243"/>

  <rect class="box" x="200" y="230" width="60" height="26" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text class="text" x="230" y="246" text-anchor="middle">P3</text>
  <line class="arr" x1="265" y1="243" x2="270" y2="243"/>

  <rect class="box" x="270" y="230" width="60" height="26" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text class="text" x="300" y="246" text-anchor="middle">P4</text>
  <line class="arr" x1="335" y1="243" x2="340" y2="243"/>

  <rect class="box" x="340" y="230" width="60" height="26" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text class="text" x="370" y="246" text-anchor="middle">P5</text>
  <line class="arr" x1="405" y1="243" x2="410" y2="243"/>

  <rect class="box" x="410" y="230" width="60" height="26" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text class="text" x="440" y="246" text-anchor="middle">P6</text>

  <line class="arr" x1="440" y1="260" x2="440" y2="265"/>

  <rect class="box" x="200" y="270" width="260" height="28" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text class="text" x="330" y="287" text-anchor="middle">选股 → Regime → 行业分散 → 风控</text>

  <line class="arr-down" x1="340" y1="303" x2="340" y2="313"/>

  <!-- 区域4: 下游应用 -->
  <rect class="zone" x="40" y="313" width="600" height="55"/>
  <text class="title" x="50" y="309">4. 下游应用</text>

  <rect class="box" x="150" y="330" width="90" height="30" fill="#F5F5F5" stroke="#616161"/>
  <text class="text" x="195" y="348" text-anchor="middle">回测引擎</text>

  <rect class="box" x="290" y="330" width="90" height="30" fill="#F5F5F5" stroke="#616161"/>
  <text class="text" x="335" y="348" text-anchor="middle">模拟交易</text>

  <rect class="box" x="430" y="330" width="90" height="30" fill="#F5F5F5" stroke="#616161"/>
  <text class="text" x="475" y="348" text-anchor="middle">AI 分析</text>
</svg>
