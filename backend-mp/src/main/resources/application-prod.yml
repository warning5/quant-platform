# ========== 生产环境 ==========
# 启动方式:
#   MYSQL_HOST=rm-xxx.mysql.rds.aliyuncs.com \
#   MYSQL_PORT=3306 \
#   MYSQL_DATABASE=stock_prod \
#   MYSQL_USER=quant_app \
#   MYSQL_PASSWORD=xxx \
#   MP_TOKEN=xxx \
#   java -jar backend-mp.jar --spring.profiles.active=prod
#
# 所有敏感信息均通过环境变量注入，不在此文件硬编码

mp:
  token: ${MP_TOKEN}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&tinyInt1isBit=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000

logging:
  level:
    com.quant.platform: WARN
