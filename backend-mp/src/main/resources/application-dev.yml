# ========== 本地开发环境 ==========
# 启动方式: java -jar backend-mp.jar (默认 dev)
# 或显式指定: java -jar backend-mp.jar --spring.profiles.active=dev

mp:
  token: quant-mp-2026-secret

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stock?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&tinyInt1isBit=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
